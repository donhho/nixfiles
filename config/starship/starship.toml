"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "cyan"

[character]
success_symbol = "[\\$](#ffffff)"
error_symbol = "[\\$](#ff7676)"

[git_branch]
format = "[$branch]($style)"
style = "red"

[git_status]
format = "([*$all_status$ahead_behind$stashed]($style) )"

conflicted = "\u200B"
untracked = "\u200B"
modified = "\u200B"
staged = "\u200B"
renamed = "\u200B"
deleted = "\u200B"
typechanged = "\u200B"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = '[\($virtualenv\)]($style) '
style = "pink"
detect_extensions = []
detect_files = []
